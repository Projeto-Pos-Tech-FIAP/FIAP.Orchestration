# Placeholder — descomentar quando FIAP.NotificationAPI for criado
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-api
  namespace: fiap-games
  labels:
    app: notification-api
    tier: service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-api
  template:
    metadata:
      labels:
        app: notification-api
    spec:
      containers:
        - name: notification-api
          image: fiap/notification-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: shared-infra-config
            - configMapRef:
                name: notification-api-config
            - secretRef:
                name: notification-api-secret
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
